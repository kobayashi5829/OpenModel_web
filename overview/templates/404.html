{% extends "base.html" %}
{% load static %}

{% block title %}404 Not Found{% endblock %}

{% block extra_css %}
<style>
    .error-section {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 200px);
        padding: 3rem 1rem;
        background-color: #f8fafc;
    }
    .error-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        border: 1px solid #f1f5f9;
        width: 100%;
        max-width: 480px;
        padding: 3rem 2rem;
        text-align: center;
        animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    /* エラーイラスト (3Dキューブ) */
    .error-illustration {
        height: 140px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 2rem;
        position: relative;
        perspective: 400px;
    }
    .cube-wrapper {
        width: 50px;
        height: 50px;
        position: relative;
        transform-style: preserve-3d;
        animation: rotateCube 8s linear infinite;
    }
    .cube-face {
        position: absolute;
        width: 50px;
        height: 50px;
        border: 2px solid #818cf8;
        background: rgba(99, 102, 241, 0.1);
    }
    .cube-face.front  { transform: rotateY(0deg) translateZ(25px); }
    .cube-face.back   { transform: rotateY(180deg) translateZ(25px); }
    .cube-face.right  { transform: rotateY(90deg) translateZ(25px); }
    .cube-face.left   { transform: rotateY(-90deg) translateZ(25px); }
    .cube-face.top    { transform: rotateX(90deg) translateZ(25px); }
    .cube-face.bottom { transform: rotateX(-90deg) translateZ(25px); }
    
    @keyframes rotateCube {
        from { transform: rotateX(0deg) rotateY(0deg); }
        to { transform: rotateX(360deg) rotateY(360deg); }
    }
    /* テキスト */
    .error-code {
        font-size: 5rem;
        font-weight: 800;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1.1;
        margin-bottom: 0.5rem;
    }
    .error-title {
        font-size: 1.4rem;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 1rem;
    }
    .error-message {
        font-size: 0.95rem;
        color: #64748b;
        line-height: 1.6;
        margin-bottom: 2.5rem;
    }
    /* ボタン */
    .btn-home {
        display: inline-block;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        text-decoration: none;
        font-weight: 700;
        padding: 0.8rem 2rem;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(118, 75, 162, 0.25);
        transition: all 0.3s;
    }
    .btn-home:hover {
        box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
    }
</style>
{% endblock %}

{% block content %}
<section class="error-section">
    <div class="error-card">
        <div class="error-illustration">
            <div class="cube-wrapper">
                <div class="cube-face front"></div>
                <div class="cube-face back"></div>
                <div class="cube-face right"></div>
                <div class="cube-face left"></div>
                <div class="cube-face top"></div>
                <div class="cube-face bottom"></div>
            </div>
        </div>
        <h2 class="error-code">404</h2>
        <h3 class="error-title">ページが見つかりません</h3>
        <p class="error-message">
            お探しのページは削除されたか、<br>
            URLが変更された可能性があります。
        </p>
        <a href="/" class="btn-home">ホームへ戻る</a>
    </div>
</section>
{% endblock %}
