services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - static-volume:/app/staticfiles
      - media-volume:/app/media
    depends_on:
      db:
        condition: service_healthy
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "80:80"
    volumes:
      - static-volume:/usr/share/nginx/html/static
      - media-volume:/usr/share/nginx/html/media
    depends_on:
      - app
  db:
    image: postgres:18
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - type: volume
        source: db-volume
        target: /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1s
      timeout: 1m
      retries: 10
    
volumes:
  static-volume:
  media-volume:
  db-volume: