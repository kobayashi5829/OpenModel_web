{% extends "base.html" %}
{% load static %}
{% load i18n %}
{% load account %}

{% block title %}パスワード再設定完了{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
<style>
    .success-icon-wrapper {
        display: flex;
        justify-content: center;
        margin-bottom: 1.5rem;
    }
    .success-icon {
        width: 64px;
        height: 64px;
        stroke: #10b981;
        background-color: #ecfdf5;
        padding: 12px;
        border-radius: 50%;
    }
    .success-message {
        text-align: center;
        color: #475569;
        font-size: 0.95rem;
        line-height: 1.6;
        margin-bottom: 2rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="success-icon-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="success-icon">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        
        <div class="login-header">
            <h2>パスワード設定完了</h2>
        </div>

        <div class="success-message">
            パスワードの再設定が正常に完了しました。<br>
            新しいパスワードでサインインしてください。
        </div>

        <a href="{% url 'account_login' %}" class="btn-login" style="text-align: center; text-decoration: none; display: block; margin-top: 1rem;">
            サインインする
        </a>
    </div>
</div>
{% endblock %}
