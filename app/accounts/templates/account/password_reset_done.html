{% extends "base.html" %}
{% load static %}
{% load i18n %}
{% load account %}

{% block title %}メール送信完了{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
<style>
    .success-icon-wrapper {
        display: flex;
        justify-content: center;
        margin-bottom: 1.5rem;
    }
    .success-icon {
        width: 64px;
        height: 64px;
        stroke: #10b981;
        background-color: #ecfdf5;
        padding: 12px;
        border-radius: 50%;
    }
    .success-message {
        text-align: center;
        color: #475569;
        font-size: 0.95rem;
        line-height: 1.6;
        margin-bottom: 2rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="success-icon-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="success-icon">
                <path d="M22 2L11 13"></path>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </div>
        
        <div class="login-header">
            <h2>メールを送信しました</h2>
        </div>

        <div class="success-message">
            ご登録のメールアドレス宛に、パスワード再設定用のリンクを記載したメールを送信しました。メール内のリンクをクリックして、新しいパスワードを設定してください。
        </div>

        <div class="login-footer" style="margin-top: 0;">
            <p><a href="{% url 'account_login' %}">サインイン画面に戻る</a></p>
        </div>
    </div>
</div>
{% endblock %}
